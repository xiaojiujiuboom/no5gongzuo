beam:
  source_type: parametric
  n_macroparticles: 200000
  n_deuterons: 1.0e12
  kT_MeV: 2.0
  theta_max_deg: 15.0
  E_min_MeV: 0.1
  E_max_MeV: 10.0
  seed: 20260701
  parametric_scan:
    kT_MeV: [1.0, 2.0, 3.0]
    theta_max_deg: [10.0, 20.0]

target_cd2:
  rho_g_cm3: 1.06
  source_geometry: external_thick_cd2_converter
  converter_policy: stop_to_rest
  stopping_table: data/stopping_D_in_CD2.csv

target_converter:
  baseline_material: TiD2
  baseline_status: planned_requires_stopping_and_direct_triton_branch
  sensitivity_materials: [CD2]
  report_channels:
    direct_triton_DdpT: true
    neutron_to_lithium_Ddn: true
  notes: "Current Stage B code still implements CD2 neutron branch only."

source_bins:
  n_mu: 15
  n_E: 100

lithium:
  radius_cm: 10.0
  height_cm: 20.0
  cavity_radius_cm: 1.0
  li6_atpct_list: [7.59, 90.0]
  density_g_cm3: 0.534

openmc:
  batches_debug: 20
  particles_debug: 100000
  batches_production: 100
  particles_production: 1000000
  preferred_library: FENDL-3.2

hpc_pic:
  accepted_source:
    plane: rear+20um
    t_end_ps: 4.0
    dt_snapshot_fs: 250
    acceptance_latest_window_fraction: 0.10
  first_2d_scan:
    a0: [5, 10, 20]
    preplasma_L_um: [0, 1]
    target_thickness_um: [5]
    ppc:
      electron: 16
      deuteron: 16
      carbon: 8
    slurm:
      partition: amd_m9_768
      ranks: 160
      walltime_h: null  # Required per submission; do not rely on a script default.
  optional_followup_2d_scan:
    target_thickness_um: [3]
  production_dimension: 2d3v
  validation_3d_cases: 1

physics:
  geometry_lock: laser_thin_foil_deuteron_source_plus_external_thick_deuteride_converter
  compare_case_A_B_per_source_neutron: true
  report_direct_DD_tritium_separately: true
