beam:
  source_type: parametric
  n_macroparticles: 200000
  n_deuterons: 1.0e12
  kT_MeV: 2.0
  theta_max_deg: 15.0
  E_min_MeV: 0.1
  E_max_MeV: 10.0
  seed: 20260701
  parametric_scan:
    kT_MeV: [1.0, 2.0, 3.0]
    theta_max_deg: [10.0, 20.0]

target_cd2:
  rho_g_cm3: 1.06
  source_geometry: external_thick_cd2_converter
  converter_policy: stop_to_rest
  stopping_table: data/stopping_D_in_CD2.csv

target_converter:
  baseline_material: CD2
  baseline_status: current_paper_scope_cd2_per_source_neutron_fidelity
  future_materials: [TiD2]
  report_channels:
    direct_triton_DdpT: future_work_not_in_current_scope
    neutron_to_lithium_Ddn: true
  quantitative_scope:
    primary_observable: per_source_neutron_Li_TPR
    absolute_per_shot_yields: provisional_until_sigma_and_stopping_gates_pass
  blockers_before_absolute_yield_claims:
    sigma_ddn_ddp_against_endf_or_nrl: required
    stopping_D_in_CD2_from_SRIM_PSTAR_or_equivalent: required
  notes: "Current paper scope is CD2 converter D(d,n) neutron branch into Li. TiD2 and direct D(d,p)T are future work unless implemented and validated."

source_bins:
  n_mu: 15
  n_E: 100

lithium:
  radius_cm: 10.0
  height_cm: 20.0
  cavity_radius_cm: 1.0
  li6_atpct_list: [7.59, 90.0]
  density_g_cm3: 0.534

